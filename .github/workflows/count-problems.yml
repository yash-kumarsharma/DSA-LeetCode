name: Update Problem Count Badge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  count:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Count Java files
        id: count
        run: |
          COUNT=$(find . -name "*.java" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Create badge JSON
        run: |
          mkdir -p .github
          echo "{\"schemaVersion\": 1, \"label\": \"Problems Solved\", \"message\": \"${{ steps.count.outputs.count }}\", \"color\": \"blue\"}" > .github/problem-count.json

      - name: Commit badge
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .github/problem-count.json
          git commit -m "Update problem count badge" || exit 0
          git push
